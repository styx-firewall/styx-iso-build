
# Disable installation of the standard kernel
d-i base-installer/kernel/image string none

# User configuration
#d-i passwd/root-login boolean false
#d-i passwd/make-user boolean true
d-i passwd/make-user boolean false
d-i passwd/allow-badname boolean true
d-i user-setup/allow-password-weak boolean true
d-i passwd/user-fullname string admin
#d-i passwd/username string admin
#d-i passwd/user-password password admin
#d-i passwd/user-password-again password admin
#d-i user-setup/encrypt-home boolean false

### Partitioning
d-i partman-auto/method string lvm
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true

#d-i partman-auto/disk string /dev/sda

d-i partman-partitioning/default_label string gpt
d-i partman/choose_label string gpt
d-i partman/confirm_write_new_label boolean true

### EFI only (UEFI mandatory)
d-i partman-basicfilesystems/no_swap boolean false
d-i partman-efi/non_efi_system boolean false
d-i partman-efi/confirm boolean true
d-i partman-efi/confirm_nooverwrite boolean true

### Guided LVM size (needed to suppress prompt)
d-i partman-auto-lvm/guided_size string max
d-i partman-auto-lvm/new_size string max

### Select our custom recipe
d-i partman-auto/choose_recipe select uefi-lvm
d-i partman-auto/confirm boolean true

### Recipe
d-i partman-auto/expert_recipe string                         \
  uefi-lvm ::                                                 \
    512 512 512 fat32                                         \
      $primary{ }                                             \
      method{ efi } format{ }                                 \
    .                                                         \
    1024 1024 1024 ext4                                       \
      $primary{ }                                             \
      $bootable{ }                                            \
      method{ format } format{ }                              \
      use_filesystem{ } filesystem{ ext4 }                    \
      mountpoint{ /boot }                                     \
    .                                                         \
    100 30000 -1 lvm                                          \
      $defaultignore{ }                                       \
      method{ lvm }                                           \
      vg_name{ vg_styx }                                      \
    .                                                         \
    15000 15000 15000 ext4                                    \
      $lvmok{}                                                \
      in_vg{ vg_styx }                                        \
      lv_name{ root }                                         \
      method{ format } format{ }                              \
      use_filesystem{ } filesystem{ ext4 }                    \
      mountpoint{ / }                                         \
    .                                                         \
    8000 8000 8000 ext4                                       \
      $lvmok{}                                                \
      in_vg{ vg_styx }                                        \
      lv_name{ var }                                          \
      method{ format } format{ }                              \
      use_filesystem{ } filesystem{ ext4 }                    \
      mountpoint{ /var }                                      \
    .                                                         \
    4000 4000 4000 ext4                                       \
      $lvmok{}                                                \
      in_vg{ vg_styx }                                        \
      lv_name{ varlog }                                       \
      method{ format } format{ }                              \
      use_filesystem{ } filesystem{ ext4 }                    \
      mountpoint{ /var/log }                                  \
    .                                                         \
    2000 2000 2000 ext4                                       \
      $lvmok{}                                                \
      in_vg{ vg_styx }                                        \
      lv_name{ audit }                                        \
      method{ format } format{ }                              \
      use_filesystem{ } filesystem{ ext4 }                    \
      mountpoint{ /var/log/audit }                            \
    .                                                         \
    512 512 512 ext4                                          \
      $lvmok{}                                                \
      in_vg{ vg_styx }                                        \
      lv_name{ home }                                         \
      method{ format } format{ }                              \
      use_filesystem{ } filesystem{ ext4 }                    \
      mountpoint{ /home }                                     \
    .
### Confirm partitioning
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# Mirror
d-i mirror/country string automatic
d-i mirror/http/proxy string
d-i mirror/protocol string http
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i apt-setup/security_host string security.debian.org
d-i apt-setup/security_path string /debian-security

# Do not participate in survey
d-i popularity-contest/participate boolean false

# Network configuration
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string styx
d-i netcfg/get_domain string styx.local

# Timezone and locale
d-i clock-setup/utc boolean true
d-i clock-setup/configure boolean false
d-i clock-setup/ntp boolean true
d-i clock-setup/ntp-server string pool.ntp.org
d-i time/zone string Etc/UTC
d-i debian-installer/locale string en_US.UTF-8
#d-i keyboard-configuration/xkb-keymap select us

# Traditional ethernet names
#d-i debian-installer/add-kernel-opts string net.ifnames=0 biosdevname=0

# Include our custom kernel (already added to pool/extras)
d-i apt-setup/local0/repository string file:/cdrom/ dists/stable/extras/binary-amd64/
d-i apt-setup/local0/comment string Custom packages
d-i pkgsel/include string curl linux-image-styx nftables net-tools vlan \
    ifenslave bridge-utils openssl ulogd2 ulogd2-json ulogd2-pcap python3-pam openssh-server lvm2 \
    openssh-client lighttpd lighttpd-mod-openssl php-fpm php-intl udhcpc styx-conf styx-firewall

# Do not install recommended packages
tasksel tasksel/first multiselect
d-i pkgsel/install-recommends boolean false
d-i pkgsel/install-language-support boolean false

# Do not update packages
#d-i pkgsel/update-policy select none
#d-i pkgsel/upgrade select none

### GRUB (UEFI)
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean false
d-i grub-installer/bootdev string default
d-i grub-installer/confirm boolean true

# Avoid installing GRUB
# d-i grub-installer/skip boolean true

# Late commands
# update-initramfs for the custom kernel does not use -k all
d-i preseed/late_command string \
    cp /cdrom/styx-postinst.sh /target/ ; \
    cp /var/log/syslog /target/root/install.log ; \
    in-target sed -i '/cdrom:/d' /etc/apt/sources.list ; \
    in-target apt update ; \
    in-target apt-get install initramfs-tools -y ; \
    in-target update-initramfs -u -k 6.12.48-14-styx ; \
    in-target update-grub ;\
    in-target bash /styx-postinst.sh ; \
    in-target rm /styx-postinst.sh

# Finish
#d-i finish-install/reboot_in_progress note
#d-i debian-installer/exit/poweroff boolean true